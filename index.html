<!DOCTYPE html>
<html>
<head>
  <title>Recharge App</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body style="font-family: Arial; padding: 40px;">
  <h1>Recharge Card App</h1>

  <input id="email" type="email" placeholder="Email" style="display:block;margin:10px 0;padding:10px;">
  <input id="password" type="password" placeholder="Password" style="display:block;margin:10px 0;padding:10px;">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script>
    const firebaseConfig = {
      apiKey: "PASTE_YOURS",
      authDomain: "PASTE_YOURS",
      projectId: "PASTE_YOURS",
      storageBucket: "PASTE_YOURS",
      messagingSenderId: "PASTE_YOURS",
      appId: "PASTE_YOURS"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signup() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => document.getElementById("msg").innerText = "Account created!")
        .catch(e => document.getElementById("msg").innerText = e.message);
    }

    function login() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => document.getElementById("msg").innerText = "Login successful!")
        .catch(e => document.getElementById("msg").innerText = e.message);
    }
  </script>

</body>
</html>
