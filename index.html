<!DOCTYPE html>
<html>
<head>
  <title>Recharge App</title>

  <!-- Firebase (compat version for simple HTML apps) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body style="font-family: Arial; padding: 40px;">
  <h1>Recharge Card App</h1>

  <input id="email" type="email" placeholder="Email" style="display:block;margin:10px 0;padding:10px;">
  <input id="password" type="password" placeholder="Password" style="display:block;margin:10px 0;padding:10px;">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script>
    // 🔥 PASTE YOUR REAL FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "PASTE_FROM_FIREBASE",
      authDomain: "PASTE_FROM_FIREBASE",
      projectId: "PASTE_FROM_FIREBASE",
      storageBucket: "PASTE_FROM_FIREBASE",
      messagingSenderId: "PASTE_FROM_FIREBASE",
      appId: "PASTE_FROM_FIREBASE"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // SIGN UP
    function signup() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("msg").innerText = "Account created successfully!";
        })
        .catch((error) => {
          document.getElementById("msg").innerText = error.message;
        });
    }

    // LOGIN
    function login() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("msg").innerText = "Login successful!";
        })
        .catch((error) => {
          document.getElementById("msg").innerText = error.message;
        });
    }
  </script>

</body>
</html>
